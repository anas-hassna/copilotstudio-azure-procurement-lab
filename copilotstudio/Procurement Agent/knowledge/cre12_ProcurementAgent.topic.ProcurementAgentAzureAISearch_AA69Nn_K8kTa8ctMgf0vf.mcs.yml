mcs.metadata:
  componentName: Procurement Agent - Azure AI Search
  description: |+
    Base de données des marchés publics du GHT Contoso : appels d'offres, études de marché, rapports d'analyse, cahiers des charges, grilles de notation des candidats, SLA, pénalités, conformité technique. Catégories : biomédical, dispositifs médicaux, équipements, hôtellerie, informatique, laboratoires, médicaments, transports.


kind: KnowledgeSourceConfiguration
source:
