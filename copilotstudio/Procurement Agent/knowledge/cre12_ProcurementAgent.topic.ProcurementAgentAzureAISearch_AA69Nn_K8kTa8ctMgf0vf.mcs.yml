    - content
    - metadata_spo_item_name
    - metadata_spo_item_path
    - metadata_spo_item_last_modified
    - metadata_spo_site_library_item_id
    - chunk
    - chunk_id
    - parent_id
    - title
  semanticConfigurationName: default